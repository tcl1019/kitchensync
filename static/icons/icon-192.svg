<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <rect width="192" height="192" rx="42" fill="none" stroke="rgba(124,154,114,0.3)" stroke-width="2"/>
  <!-- Sync arrows forming a circle -->
  <g transform="translate(96,88)" fill="none" stroke="#7C9A72" stroke-width="5" stroke-linecap="round">
    <path d="M-28,-20 A35,35 0 0,1 28,-20" />
    <path d="M28,20 A35,35 0 0,1 -28,20" />
    <!-- Arrow heads -->
    <polyline points="22,-28 28,-20 20,-14" />
    <polyline points="-22,28 -28,20 -20,14" />
  </g>
  <!-- Fork -->
  <g transform="translate(76,76)" fill="none" stroke="#E8E2D9" stroke-width="3.5" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="30"/>
    <line x1="-6" y1="0" x2="-6" y2="12"/>
    <line x1="6" y1="0" x2="6" y2="12"/>
    <path d="M-6,12 Q-6,18 0,18 Q6,18 6,12" fill="none"/>
  </g>
  <!-- Knife -->
  <g transform="translate(116,76)" fill="none" stroke="#E8E2D9" stroke-width="3.5" stroke-linecap="round">
    <line x1="0" y1="14" x2="0" y2="30"/>
    <path d="M0,0 Q8,7 0,14" fill="rgba(232,226,217,0.15)" stroke="#E8E2D9"/>
  </g>
  <!-- Text -->
  <text x="96" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="400" fill="#7C9A72" letter-spacing="1.5">KS</text>
</svg>
