<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(124,154,114,0.3)" stroke-width="3"/>
  <!-- Sync arrows forming a circle -->
  <g transform="translate(256,220)" fill="none" stroke="#7C9A72" stroke-width="12" stroke-linecap="round">
    <path d="M-75,-54 A94,94 0 0,1 75,-54" />
    <path d="M75,54 A94,94 0 0,1 -75,54" />
    <!-- Arrow heads -->
    <polyline points="59,-76 75,-54 53,-38" />
    <polyline points="-59,76 -75,54 -53,38" />
  </g>
  <!-- Fork -->
  <g transform="translate(206,188)" fill="none" stroke="#E8E2D9" stroke-width="9" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="80"/>
    <line x1="-16" y1="0" x2="-16" y2="32"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <path d="M-16,32 Q-16,48 0,48 Q16,48 16,32" fill="none"/>
  </g>
  <!-- Knife -->
  <g transform="translate(306,188)" fill="none" stroke="#E8E2D9" stroke-width="9" stroke-linecap="round">
    <line x1="0" y1="38" x2="0" y2="80"/>
    <path d="M0,0 Q22,19 0,38" fill="rgba(232,226,217,0.15)" stroke="#E8E2D9"/>
  </g>
  <!-- Text -->
  <text x="256" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="400" fill="#7C9A72" letter-spacing="4">KitchenSync</text>
  <text x="256" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#9B9288" letter-spacing="2">PANTRY &amp; RECIPES</text>
</svg>
